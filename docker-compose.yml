version: '3.9'

# =============================================================================
# LOCAL DEVELOPMENT — docker compose up
# Starts: PostgreSQL 16 + PostGIS, Redis 7, NestJS API, BullMQ Worker
# The mobile app (Expo) runs on your host machine via: npm run mobile
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + PostGIS 3.4
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    container_name: blooddonation_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blooddonation
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d blooddonation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: blooddonation_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: blooddonation_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/blooddonation
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend/src:/app/src:ro
      - ./prisma:/app/prisma:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # BullMQ Worker (same image, different entrypoint)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: blooddonation_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/blooddonation
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      WORKER_MODE: "true"
    volumes:
      - ./apps/backend/src:/app/src:ro
      - ./prisma:/app/prisma:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "-r", "ts-node/register", "src/worker.ts"]

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
